#dialogBox .npc-name .dot{width:10px;height:10px;border-radius:50%;display:inline-block}
.chat-history{max-height:160px;overflow-y:auto;margin-bottom:10px;padding:8px;background:rgba(0,0,0,0.25);border-radius:8px}
.chat-msg{margin-bottom:5px;font-size:13px;line-height:1.5}.chat-msg .s{font-weight:700;margin-right:4px}
.chat-msg.p .s{color:#88CCFF}.chat-msg.n .s{color:#FFB347}
.chat-input-wrap{display:flex;gap:6px;margin-top:8px}
.chat-input-wrap input{flex:1;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:6px;padding:6px 10px;color:#fff;font-size:13px;outline:none}

.chat-input-wrap input::placeholder{color:rgba(255,255,255,0.35)}

function bws(){const S=[];S.push({x1:-.5,y1:-.5,x2:19.5,y2:-.5});S.push({x1:-.5,y1:16.5,x2:19.5,y2:16.5});S.push({x1:-.5,y1:-.5,x2:-.5,y2:16.5});S.push({x1:19.5,y1:-.5,x2:19.5,y2:16.5});for(const wl of WD){const ds=wl.doors.map(id=>DD[id]).filter(Boolean);if(wl.type==='h'){ds.sort((a,b)=>a.x1-b.x1);let cx=wl.x1;for(const d of ds){if(d.x1>cx+.01)S.push({x1:cx,y1:wl.y,x2:d.x1,y2:wl.y});if(d.anim<.9){const pw=(d.x2-d.x1)*(1-d.anim),pc=dcx(d);S.push({x1:pc-pw/2,y1:wl.y,x2:pc+pw/2,y2:wl.y})}cx=d.x2}if(cx<wl.x2-.01)S.push({x1:cx,y1:wl.y,x2:wl.x2,y2:wl.y})}else{ds.sort((a,b)=>a.y1-b.y1);let cy=wl.y1;for(const d of ds){if(d.y1>cy+.01)S.push({x1:wl.x,y1:cy,x2:wl.x,y2:d.y1});if(d.anim<.9){const ph=(d.y2-d.y1)*(1-d.anim),pc=(d.y1+d.y2)/2;S.push({x1:wl.x,y1:pc-ph/2,x2:wl.x,y2:pc+ph/2})}cy=d.y2}if(cy<wl.y2-.01)S.push({x1:wl.x,y1:cy,x2:wl.x,y2:wl.y2})}}return S}
function cpSeg(px,py,x1,y1,x2,y2){const dx=x2-x1,dy=y2-y1,l2=dx*dx+dy*dy;if(l2===0)return{x:x1,y:y1};let t=((px-x1)*dx+(py-y1)*dy)/l2;t=Math.max(0,Math.min(1,t));return{x:x1+t*dx,y:y1+t*dy}}
function rWalls(ox,oy,nx,ny){const segs=bws();for(let i=0;i<3;i++){let p=false;for(const s of segs){const cp=cpSeg(nx,ny,s.x1,s.y1,s.x2,s.y2);const dx=nx-cp.x,dy=ny-cp.y,d=Math.sqrt(dx*dx+dy*dy);if(d<PR&&d>.001){const u=(PR-d)/d;nx+=dx*u;ny+=dy*u;p=true}}if(!p)break}nx=Math.max(0.5,Math.min(MC-1.5,nx));ny=Math.max(0.5,Math.min(MR-1.5,ny));return{col:nx,row:ny}}

class Ch{
  constructor(col,row,cl,name,isP){this.col=col;this.row=row;this.cl=cl;this.name=name;this.isP=isP;this.tc=col;this.tr=row;this.mv=false}
  get sp(){return ts(this.col,this.row)}
  get depth(){return this.col+this.row}
  update(dt){if(this.mv){const dc=this.tc-this.col,dr=this.tr-this.row,d=Math.sqrt(dc*dc+dr*dr);if(d<.05){this.col=this.tc;this.row=this.tr;this.mv=false}else{const s=Math.min((this.isP?SPD:SPD*.4)*dt,d);let nx=this.col+(dc/d)*s,ny=this.row+(dr/d)*s;if(!this.isP){const w=rWalls(this.col,this.row,nx,ny);nx=w.col;ny=w.row;if(canWalk(nx,ny)){this.col=nx;this.row=ny}}else{this.col=nx;this.row=ny}}}}
  draw(){const p=this.sp;dR(p.x,p.y,this.cl,0,this.name,this.isP)}
  dist(o){return Math.sqrt((this.col-o.col)**2+(this.row-o.row)**2)}
}

  constructor(col,row,cl,name,title,idx){super(col,row,cl,name,false);this.title=title;this.idx=idx;this.state='idle';this.st=0;this.nat=5+Math.random()*5;this.wps=[];this.wi=0;this.inEvt=false}

  else if(/再见|拜拜|bye|回头|走了/.test(txt))t='bye';
  const rs=p.r[t]||p.r.general;return rs[Math.floor(Math.random()*rs.length)]}
function openDlg(npc){dlgAct=true;actNPC=npc;document.getElementById('dialogBox').style.display='block';document.getElementById('npcDot').style.backgroundColor=npc.cl.body;document.getElementById('npcNameLabel').textContent=npc.name+' - '+npc.title;const h=document.getElementById('chatHistory');h.innerHTML='';aCM(npc.name,npc.greet(),'n');const qo=document.getElementById('quickOpts');qo.innerHTML='';['你好！','在忙什么？','聊聊AI产品？','再见！'].forEach(t=>{const d=document.createElement('div');d.className='quick-opt';d.textContent=t;d.addEventListener('click',()=>sMsg(t));qo.appendChild(d)});document.getElementById('chatInput').value='';document.getElementById('chatInput').focus()}
function aCM(name,text,type){const h=document.getElementById('chatHistory');const d=document.createElement('div');d.className='chat-msg '+(type==='p'?'p':'n');d.innerHTML='<span class="s">'+name+'：</span>'+text;h.appendChild(d);h.scrollTop=h.scrollHeight}
function sMsg(text){if(!text.trim()||!actNPC)return;aCM('Alex',text,'p');feedChat('Alex',text);setTimeout(()=>{const r=genR(text,actNPC);aCM(actNPC.name,r,'n');feedChat(actNPC.name,r)},300+Math.random()*500);document.getElementById('chatInput').value=''}
document.addEventListener('DOMContentLoaded',()=>{document.getElementById('chatInput').addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();sMsg(e.target.value)}})});
function closeDialog(){dlgAct=false;actNPC=null;document.getElementById('dialogBox').style.display='none'}
NPC.prototype.greet=function(){const p=NPC_P[this.name];if(p)return p.greet[Math.floor(Math.random()*p.greet.length)];return'你好！'};

// ==================== 玩家移动 ====================
function uP(dt){
  if(dlgAct)return;
  if(ap.active){updateAP(dt);
    const gc=Math.round(player.col),gr=Math.round(player.row);
    if(gc>=0&&gc<MC&&gr>=0&&gr<MR)document.getElementById('roomLabel').textContent=RC[grk(gr,gc)]?RC[grk(gr,gc)].label:'走廊';
    return}
  const elapsed=(performance.now()-ap.lastInput)/1000;
  if(elapsed>20){activateAP();return}
  let dc=0,dr=0;
  if(keys['w']||keys['arrowup']){dc-=1;dr-=1}if(keys['s']||keys['arrowdown']){dc+=1;dr+=1}
  if(keys['a']||keys['arrowleft']){dc-=1;dr+=1}if(keys['d']||keys['arrowright']){dc+=1;dr-=1}
  if(dc||dr){const l=Math.sqrt(dc*dc+dr*dr);dc/=l;dr/=l;const sp=SPD*dt;let nx=player.col+dc*sp,ny=player.row+dr*sp;const w=rWalls(player.col,player.row,nx,ny);nx=w.col;ny=w.row;if(canWalk(nx,ny)){player.col=nx;player.row=ny}else if(canWalk(nx,player.row)){player.col=nx}else if(canWalk(player.col,ny)){player.row=ny}}
  const gc=Math.round(player.col),gr=Math.round(player.row);
  if(gc>=0&&gc<MC&&gr>=0&&gr<MR)document.getElementById('roomLabel').textContent=RC[grk(gr,gc)]?RC[grk(gr,gc)].label:'走廊';
}

// ==================== 门动画 ====================
function uD(dt){for(const[id,d]of Object.entries(DD)){const cc=dcx(d);let near=false;if(Math.sqrt((player.col-cc)**2+(player.row-d.y)**2)<2)near=true;for(const n of npcs)if(Math.sqrt((n.col-cc)**2+(n.row-d.y)**2)<2)near=true;if(near)d.anim=Math.min(1,d.anim+dt*3);else d.anim=Math.max(0,d.anim-dt*2);d.open=d.anim>.8}}

// ==================== 镜头 ====================
function uC(){const tx=(player.col-player.row)*(TW/2),ty=(player.col+player.row)*(TH/2);camX+=(tx-camX)*.15;camY+=(ty-camY)*.15}

// ==================== 小地图 ====================
function dM(){const mw=180,mh=160,sx=mw/MC,sy=mh/MR;mx.fillStyle='#1A1A2E';mx.fillRect(0,0,mw,mh);for(let r=0;r<MR;r++)for(let c=0;c<MC;c++){mx.fillStyle=RC[grk(r,c)].floor;mx.fillRect(c*sx,r*sy,sx-.5,sy-.5)}mx.fillStyle='rgba(0,0,0,0.3)';FL.forEach(f=>{if(!f.noBlock)for(let dr=0;dr<f.h;dr++)for(let dc=0;dc<f.w;dc++)mx.fillRect((f.col+dc)*sx,(f.row+dr)*sy,sx,sy)});for(const[id,d]of Object.entries(DD)){mx.fillStyle=d.anim>.8?'rgba(80,200,80,0.7)':'rgba(200,100,50,0.7)';mx.fillRect(d.x1*sx,(d.y-.3)*sy,(d.x2-d.x1)*sx,sy*.6)}npcs.forEach(n=>{mx.fillStyle=n.cl.body;mx.beginPath();mx.arc(n.col*sx,n.row*sy,3,0,Math.PI*2);mx.fill()});mx.fillStyle='#4A90D9';mx.strokeStyle='#FFF';mx.lineWidth=1.5;mx.beginPath();mx.arc(player.col*sx,player.row*sy,4,0,Math.PI*2);mx.fill();mx.stroke()}

// ==================== 主渲染 ====================
function gE(){const els=[];FL.forEach(f=>els.push({t:'f',it:f,d:f.col+f.row}));els.push({t:'p',ch:player,d:player.col+player.row});npcs.forEach(n=>els.push({t:'n',ch:n,d:n.col+n.row}));return els.sort((a,b)=>a.d-b.d)}
function render(){cx.clearRect(0,0,cv.width,cv.height);const bg=cx.createLinearGradient(0,0,0,cv.height);bg.addColorStop(0,'#2A2A3E');bg.addColorStop(1,'#1A1A2E');cx.fillStyle=bg;cx.fillRect(0,0,cv.width,cv.height);drawFloor();drawLabels();drawWalls();drawDoors();gE().forEach(el=>{if(el.t==='f')dFI(el.it);else if(el.t==='p')el.ch.draw();else if(el.t==='n'){el.ch.draw();if(player.dist(el.ch)<3&&!dlgAct){const s=el.ch.sp;cx.fillStyle='rgba(255,255,255,0.8)';cx.font='10px "PingFang SC"';cx.textAlign='center';cx.fillText('点击对话',s.x,s.y-50)}const s=el.ch.sp;const em={idle:'💤',working:'💻',testing:'🤖',lab_work:'🔧',kitchen:'☕',course_dev:'📚',meeting_state:'📋',event:'📢'};cx.font='12px Arial';cx.textAlign='center';cx.fillText(em[el.ch.state]||'💤',s.x+18,s.y-35)}})}

// ==================== 游戏循环 ====================
function loop(ts){if(!started){requestAnimationFrame(loop);return}const dt=Math.min((ts-lastT)/1000,.05);lastT=ts;fc++;uP(dt);npcs.forEach(n=>n.update(dt));uD(dt);tryNPCChat(dt);updateGEVT(dt);uC();render();if(fc%15===0)dM();requestAnimationFrame(loop)}
function startGame(){document.getElementById('title-screen').style.display='none';initGame();started=true;lastT=performance.now()}
requestAnimationFrame(loop);window.startGame=startGame;window.closeDialog=closeDialog;
</script>
